version: '3.8'

services:
  flask_server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - ai_model

  ai_model:
    build:
      context: .
      dockerfile: Recommendation_System/Dockerfile
    volumes:
      - ./Recommendation_System:/recommendation_system
